{% extends 'base.html' %}
{% block title %}{{ _('edit') }} {{ _('tasks') }} – WorkPulse{% endblock %}
{% block content %}
<div class='card p-4 mx-auto' style='max-width: 600px;'>
  <h2 class="mb-4">{{ _('edit') }} {{ _('tasks') }}</h2>
  <form method="post">
    <div class="mb-3">
      <label for="title" class="form-label">{{ _('task_title') }}</label>
      <input type="text" class="form-control" id="title" name="title" value="{{ task.title }}" required>
    </div>
    <div class="mb-3">
      <label for="project_id" class="form-label">{{ _('projects') }}</label>
      <select class="form-select" id="project_id" name="project_id" required>
        {% for proj in projects %}
          <option value="{{ proj.id }}" {% if task.project_id == proj.id %}selected{% endif %}>{{ proj.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label for="status" class="form-label">{{ _('status') }}</label>
      <select class="form-select" id="status" name="status">
        <option value="Pause" {% if task.status == 'Pause' %}selected{% endif %}>{{ _('pause') }}</option>
        <option value="Running" {% if task.status == 'Running' %}selected{% endif %}>{{ _('running') }}</option>
        <option value="Finish" {% if task.status == 'Finish' %}selected{% endif %}>{{ _('finish') }}</option>
      </select>
    </div>
    <div class="mb-3" id="approverContainer" style="display: none;">
      <label for="approver_id" class="form-label fw-bold">{{ 'المدير المعتمد' if current_lang == 'ar' else 'Approving Manager' }}</label>
      <select class="form-select" id="approver_id" name="approver_id">
        <option value="0">{{ 'لا يتطلب موافقة من مدير' if current_lang == 'ar' else 'No approval required' }}</option>
        {% for mgr in my_managers %}
          <option value="{{ mgr.id }}" {% if task.approver_id == mgr.id %}selected{% endif %}>{{ mgr.full_name or mgr.username }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-4">
      <label for="description" class="form-label">{{ _('description') }}</label>
      <textarea class="form-control" id="description" name="description" rows="3">{{ task.description or '' }}</textarea>
    </div>
    <div class='d-flex gap-2'>
      <button type="submit" class="btn btn-primary px-4">{{ _('save') }}</button>
      <a href="{{ url_for('employee_dashboard') }}" class="btn btn-secondary px-4">{{ _('cancel') }}</a>
    </div>
  </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const statusSelect = document.getElementById('status');
    const approverContainer = document.getElementById('approverContainer');
    
    function toggleApprover() {
      if (statusSelect.value === 'Finish') {
        approverContainer.style.display = 'block';
      } else {
        approverContainer.style.display = 'none';
      }
    }
    
    statusSelect.addEventListener('change', toggleApprover);
    toggleApprover();
  });
</script>
{% endblock %}
