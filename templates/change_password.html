{% extends 'base.html' %}
{% block title %}Change Password – WorkPulse{% endblock %}
{% block content %}
<div class='row justify-content-center mt-3'>
  <div class='col-md-5'>

    <div class='page-header mb-4'>
      <div>
        <h1 class='page-title'>Change Password</h1>
        <p class='page-subtitle'>Keep your account secure</p>
      </div>
      <a href='{{ url_for('index') }}' class='btn btn-secondary btn-sm'>
        ← Back
      </a>
    </div>

    <div class='card'>
      <div class='card-body p-4'>
        <form method='POST'>
          <div class='mb-4'>
            <label class='form-label' for='current_password'>Current Password</label>
            <input type='password' class='form-control' id='current_password' name='current_password' placeholder='••••••••' required>
          </div>
          <div class='mb-4'>
            <label class='form-label' for='new_password'>New Password</label>
            <input type='password' class='form-control' id='new_password' name='new_password' placeholder='••••••••' required>
          </div>
          <div class='mb-4'>
            <label class='form-label' for='confirm_password'>Confirm New Password</label>
            <input type='password' class='form-control' id='confirm_password' name='confirm_password' placeholder='••••••••' required>
          </div>
          <div class='d-flex gap-3 mt-4'>
            <button type='submit' class='btn btn-primary flex-grow-1 py-2'>
              Update Password
            </button>
            <a href='{{ url_for('index') }}' class='btn btn-secondary flex-grow-1 py-2'>
              Cancel
            </a>
          </div>
        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
