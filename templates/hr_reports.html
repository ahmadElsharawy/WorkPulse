{% extends 'base.html' %}
{% block title %}HR Reports – WorkPulse{% endblock %}
{% block content %}

<div class='page-header'>
  <div>
    <h1 class='page-title'>HR Reporting</h1>
    <p class='page-subtitle'>Generate and export detailed Excel reports</p>
  </div>
</div>

<!-- Tabs -->
<ul class='nav nav-tabs mb-4' id='reportTabs' role='tablist'>
  <li class='nav-item' role='presentation'>
    <button class='nav-link active' id='employee-tab' data-bs-toggle='tab' data-bs-target='#employee-report'
            type='button' role='tab' aria-selected='true'>
      <svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' fill='currentColor' class='me-1' viewBox='0 0 16 16'>
        <path d='M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4'/>
      </svg>
      Employee Report
    </button>
  </li>
  <li class='nav-item' role='presentation'>
    <button class='nav-link' id='project-tab' data-bs-toggle='tab' data-bs-target='#project-report'
            type='button' role='tab' aria-selected='false'>
      <svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' fill='currentColor' class='me-1' viewBox='0 0 16 16'>
        <path d='M6.5 1A1.5 1.5 0 0 0 5 2.5V3H1.5A1.5 1.5 0 0 0 0 4.5v8A1.5 1.5 0 0 0 1.5 14h13a1.5 1.5 0 0 0 1.5-1.5v-8A1.5 1.5 0 0 0 14.5 3H11v-.5A1.5 1.5 0 0 0 9.5 1zm0 1h3a.5.5 0 0 1 .5.5V3H6v-.5a.5.5 0 0 1 .5-.5m1.886 6.914L15 7.151V12.5a.5.5 0 0 1-.5.5h-13a.5.5 0 0 1-.5-.5V7.15l6.614 1.764a1.5 1.5 0 0 0 .772 0zM1.5 4h13a.5.5 0 0 1 .5.5v1.616L8.129 7.948a.5.5 0 0 1-.258 0L1 6.116V4.5a.5.5 0 0 1 .5-.5'/>
      </svg>
      Project Report
    </button>
  </li>
</ul>

<div class='tab-content' id='reportTabsContent'>
  <!-- ── Employee Report Tab ── -->
  <div class='tab-pane fade show active' id='employee-report' role='tabpanel'>
    <div class='card'>
      <div class='card-header bg-dark'>Employee Report Filters</div>
      <div class='card-body p-4'>
        <form id='employeeReportForm' class='row g-3'>
          <div class='col-md-4'>
            <label class='form-label' for='employeeSelect'>Employee <span class='text-danger'>*</span></label>
            <select class='form-select' id='employeeSelect' name='employee_id' required>
              <option value='' disabled selected>Select employee…</option>
              {% for emp in employees %}
                <option value='{{ emp.id }}'>{{ emp.full_name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class='col-md-3'>
            <label class='form-label' for='dateFrom'>Date From <span class='text-danger'>*</span></label>
            <input type='text' class='form-control' id='dateFrom' name='date_from' placeholder='YYYY-MM-DD' required>
          </div>
          <div class='col-md-3'>
            <label class='form-label' for='dateTo'>Date To <span class='text-danger'>*</span></label>
            <input type='text' class='form-control' id='dateTo' name='date_to' placeholder='YYYY-MM-DD' required>
          </div>
          <div class='col-md-2 d-flex align-items-end'>
            <button type='button' class='btn btn-export w-100 py-2' id='exportEmployeeBtn'>
              <svg xmlns='http://www.w3.org/2000/svg' width='15' height='15' fill='currentColor' class='me-1' viewBox='0 0 16 16'>
                <path d='M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5'/>
                <path d='M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708z'/>
              </svg>
              Export Excel
            </button>
          </div>

          <!-- Optional projects multi-select -->
          <div class='col-md-6'>
            <label class='form-label' for='projectSelect'>Projects Filter <span class='text-muted fw-normal'>(optional – hold Ctrl for multi)</span></label>
            <select class='form-select' id='projectSelect' name='project_ids' multiple size='5'>
              {% for proj in projects %}
                <option value='{{ proj.id }}'>{{ proj.name }}</option>
              {% endfor %}
            </select>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- ── Project Report Tab ── -->
  <div class='tab-pane fade' id='project-report' role='tabpanel'>
    <div class='card'>
      <div class='card-header bg-dark'>Project Report Filters</div>
      <div class='card-body p-4'>
        <form id='projectReportForm' class='row g-3'>
          <div class='col-md-4'>
            <label class='form-label' for='projectSelectReport'>Project <span class='text-muted fw-normal'>(optional)</span></label>
            <select class='form-select' id='projectSelectReport' name='project_id'>
              <option value='' selected>All Projects</option>
              {% for proj in projects %}
                <option value='{{ proj.id }}'>{{ proj.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class='col-md-3'>
            <label class='form-label' for='projDateFrom'>Date From <span class='text-danger'>*</span></label>
            <input type='text' class='form-control' id='projDateFrom' name='date_from' placeholder='YYYY-MM-DD' required>
          </div>
          <div class='col-md-3'>
            <label class='form-label' for='projDateTo'>Date To <span class='text-danger'>*</span></label>
            <input type='text' class='form-control' id='projDateTo' name='date_to' placeholder='YYYY-MM-DD' required>
          </div>
          <div class='col-md-2 d-flex align-items-end'>
            <button type='button' class='btn btn-export w-100 py-2' id='exportProjectBtn'>
              <svg xmlns='http://www.w3.org/2000/svg' width='15' height='15' fill='currentColor' class='me-1' viewBox='0 0 16 16'>
                <path d='M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5'/>
                <path d='M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708z'/>
              </svg>
              Export Excel
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css'>
<script src='https://cdn.jsdelivr.net/npm/flatpickr'></script>
<link rel='stylesheet' href='{{ url_for("static", filename="css/hr_reports.css") }}'>
{% endblock %}

{% block extra_js %}
<script src='{{ url_for("static", filename="js/hr_reports.js") }}'></script>
{% endblock %}
