{% extends 'base.html' %}
{% block title %}Login – WorkPulse{% endblock %}
{% block content %}
<!-- Override container padding for login -->
<style>
  .container.mt-4 { max-width: 100%; padding: 0; margin: 0 !important; }
  .wp-footer { display: none; }
</style>
<div class='login-wrapper'>
  <div class='login-card card p-4 p-md-5'>
    <!-- Logo -->
    <div class='login-logo'>WorkPulse</div>
    <p class='login-tagline'>Employee Task Management &amp; HR Reporting</p>

    <form method='post'>
      <div class='mb-4'>
        <label class='form-label' for='login-username'>
          <svg xmlns='http://www.w3.org/2000/svg' width='13' height='13' fill='currentColor' class='me-1' viewBox='0 0 16 16'>
            <path d='M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z'/>
          </svg>
          Username
        </label>
        <input type='text' id='login-username' name='username' class='form-control form-control-lg' placeholder='Enter your username' required autocomplete='username'>
      </div>
      <div class='mb-4'>
        <label class='form-label' for='login-password'>
          <svg xmlns='http://www.w3.org/2000/svg' width='13' height='13' fill='currentColor' class='me-1' viewBox='0 0 16 16'>
            <path d='M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2m3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2'/>
          </svg>
          Password
        </label>
        <input type='password' id='login-password' name='password' class='form-control form-control-lg' placeholder='••••••••' required autocomplete='current-password'>
      </div>
      <button type='submit' class='btn btn-primary w-100 py-2' style='font-size:1rem;'>
        Sign In
        <svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='currentColor' class='ms-2' viewBox='0 0 16 16'>
          <path fill-rule='evenodd' d='M1 8a.5.5 0 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8'/>
        </svg>
      </button>
    </form>

    <div class='text-center mt-4 mb-0'>
      <span style='font-size:.78rem;color:var(--text-muted);'>⚡ WorkPulse &copy; {{ 2026 }}</span>
    </div>
  </div>
</div>
{% endblock %}
