{% extends 'base.html' %}
{% block title %}Add Employee{% endblock %}
{% block content %}
<h2>Add Employee</h2>
<form method='post'>
  <div class='mb-3'>
    <label class='form-label'>Full Name</label>
    <input type='text' name='full_name' class='form-control' required>
  </div>
  <div class='mb-3'>
    <label class='form-label'>Username</label>
    <input type='text' name='username' class='form-control' required>
  </div>
  <div class='mb-3'>
    <label class='form-label'>Password</label>
    <input type='password' name='password' class='form-control' required>
  </div>
  <div class='mb-3'>
    <label class='form-label'>Position</label>
    <input type='text' name='position' class='form-control' required>
  </div>
  <div class='mb-3'>
    <label class='form-label'>Managers (optional - Hold Ctrl/Cmd to select multiple)</label>
    <select name='managers' class='form-select' multiple>
      {% for emp in employees %}
        <option value='{{ emp.username }}'>{{ emp.full_name }} ({{ emp.username }})</option>
      {% endfor %}
    </select>
  </div>
  <div class='mb-3'>
    <label class='form-label fw-bold'>Assigned Projects (choose one or more)</label>
    <div class='border rounded p-3' style='max-height: 200px; overflow-y: auto; background-color: #f8f9fa;'>
      <div class='form-check mb-2 pb-2 border-bottom'>
        <input class='form-check-input' type='checkbox' id='selectAllProjects'>
        <label class='form-check-label fw-bold' for='selectAllProjects'>
          Select All / Deselect All
        </label>
      </div>
      {% for proj in projects %}
        <div class='row mb-2 align-items-center'>
          <div class='col-auto'>
            <input class='form-check-input project-checkbox' type='checkbox' name='projects' value='{{ proj.id }}' id='proj_{{ proj.id }}'>
          </div>
          <div class='col'>
            <label class='form-check-label text-truncate d-block mb-0' for='proj_{{ proj.id }}'>
              {{ proj.name }} <span class='text-muted small'>(Client: {{ proj.client }})</span>
            </label>
          </div>
          <div class='col-md-4 col-sm-6'>
            <div class='input-group input-group-sm'>
              <span class='input-group-text'>Limit:</span>
              <input type='number' name='allocated_hours_{{ proj.id }}' class='form-control project-hours-input' 
                     placeholder='Unlimited (0)' min='0' step='1' disabled>
              <span class='input-group-text'>hrs</span>
            </div>
          </div>
        </div>
      {% endfor %}
    </div>
  </div>
  <button type='submit' class='btn btn-primary'>Add</button>
  <a href='{{ url_for('hr_employees') }}' class='btn btn-secondary ms-2'>Cancel</a>
</form>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  const selectAll = document.getElementById('selectAllProjects');
  const checkboxes = document.querySelectorAll('.project-checkbox');
  
  if (selectAll) {
    selectAll.addEventListener('change', function() {
      checkboxes.forEach(cb => {
        cb.checked = selectAll.checked;
        toggleHoursInput(cb);
      });
    });
  }
  
  function toggleHoursInput(cb) {
    const hoursInput = document.querySelector(`input[name="allocated_hours_${cb.value}"]`);
    if (hoursInput) {
      // For add page, disable if unchecked, enable if checked
      hoursInput.disabled = !cb.checked;
      if (!cb.checked) {
        hoursInput.value = '';
      }
    }
  }
  
  checkboxes.forEach(cb => {
    cb.addEventListener('change', function() {
      toggleHoursInput(cb);
      updateSelectAll();
    });
  });
  
  function updateSelectAll() {
    if (!selectAll) return;
    const allChecked = Array.from(checkboxes).every(cb => cb.checked);
    const someChecked = Array.from(checkboxes).some(cb => cb.checked);
    selectAll.checked = allChecked;
    selectAll.indeterminate = someChecked && !allChecked;
  }
  
  checkboxes.forEach(toggleHoursInput);
  updateSelectAll();
});
</script>
{% endblock %}
